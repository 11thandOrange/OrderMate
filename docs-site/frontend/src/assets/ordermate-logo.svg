<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clipboard/notepad body -->
  <rect x="18" y="12" width="55" height="70" rx="6" ry="6" fill="#2D3A4A"/>
  
  <!-- Clipboard border/frame -->
  <rect x="18" y="12" width="55" height="70" rx="6" ry="6" fill="none" stroke="#4A5568" stroke-width="2"/>
  
  <!-- Inner area of clipboard -->
  <rect x="24" y="24" width="43" height="52" rx="3" ry="3" fill="#1E2A38"/>
  
  <!-- Orange text lines on clipboard -->
  <rect x="30" y="36" width="26" height="4" rx="2" fill="#FF9F43"/>
  <rect x="30" y="46" width="22" height="4" rx="2" fill="#FF9F43"/>
  <rect x="30" y="56" width="18" height="4" rx="2" fill="#FF9F43"/>
  
  <!-- Pencil body (light blue) -->
  <g transform="rotate(-45, 72, 30)">
    <!-- Pencil main body -->
    <rect x="62" y="10" width="10" height="45" rx="1" fill="#5DADE2"/>
    <!-- Pencil tip -->
    <polygon points="67,55 62,55 67,68 72,55" fill="#F4D03F"/>
    <!-- Pencil point -->
    <polygon points="65.5,63 67,68 68.5,63" fill="#2D3A4A"/>
    <!-- Pencil eraser band -->
    <rect x="62" y="10" width="10" height="5" rx="1" fill="#3498DB"/>
    <!-- Pencil top (eraser) -->
    <rect x="62" y="5" width="10" height="7" rx="2" fill="#E74C3C"/>
  </g>
</svg>
