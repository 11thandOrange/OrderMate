<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Preview Popup - OrderMate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .popup {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Header Row */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .order-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }
        
        .btn-full-details {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f5a623;
            color: #1a1a2e;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        
        .btn-full-details:hover {
            background: #e6951a;
        }
        
        /* Pills Container */
        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .pill {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Event Type Pills */
        .pill-pickup {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .pill-delivery {
            background: rgba(33, 150, 243, 0.15);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .pill-preorder {
            background: rgba(156, 39, 176, 0.15);
            color: #9C27B0;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }
        
        /* Order Note Pills */
        .pill-note {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
            text-transform: none;
            font-size: 11px;
        }
        
        /* Details Section */
        .details {
            margin-top: 20px;
        }
        
        .detail-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        .detail-icon svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.5);
        }
        
        .detail-content {
            flex: 1;
        }
        
        .detail-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        .detail-value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Comparison */
        .comparison {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255, 255, 255, 0.2);
        }
        
        .comparison h3 {
            color: #f5a623;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .comparison-item {
            text-align: center;
        }
        
        .comparison-item h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .mini-popup {
            background: rgba(30, 30, 50, 0.95);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .mini-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .mini-title {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        
        .mini-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .mini-pill {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div>
        <!-- Main Preview -->
        <div class="popup">
            <!-- Header: Order Title + Full Details Button -->
            <div class="header">
                <span class="order-title">Order #1234</span>
                <button class="btn-full-details">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                    </svg>
                    Full Details
                </button>
            </div>
            
            <!-- All Pills (Event Type + Order Notes) -->
            <div class="pills-container">
                <span class="pill pill-pickup">PICKUP</span>
                <span class="pill pill-note">Rush Order</span>
                <span class="pill pill-note">VIP</span>
            </div>
            
            <!-- Details -->
            <div class="details">
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Customer</div>
                        <div class="detail-value">Sarah Johnson</div>
                    </div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Due Date</div>
                        <div class="detail-value">April 19, 2026 at 2:00 PM</div>
                    </div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Total</div>
                        <div class="detail-value">$125.00</div>
                    </div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Items</div>
                        <div class="detail-value">3 items</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Before/After Comparison -->
        <div class="comparison">
            <h3>Before vs After</h3>
            <div class="comparison-grid">
                <div class="comparison-item">
                    <h4>❌ BEFORE</h4>
                    <div class="mini-popup">
                        <div class="mini-header">
                            <span class="mini-pill pill-pickup">PICKUP</span>
                            <span class="mini-title">Order #1234</span>
                        </div>
                        <div class="mini-pills" style="margin-top: 8px;">
                            <span class="mini-pill pill-note">Rush Order</span>
                            <span class="mini-pill pill-note">VIP</span>
                        </div>
                    </div>
                </div>
                <div class="comparison-item">
                    <h4>✅ AFTER</h4>
                    <div class="mini-popup">
                        <div class="mini-title" style="margin-bottom: 8px;">Order #1234</div>
                        <div class="mini-pills">
                            <span class="mini-pill pill-pickup">PICKUP</span>
                            <span class="mini-pill pill-note">Rush Order</span>
                            <span class="mini-pill pill-note">VIP</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
